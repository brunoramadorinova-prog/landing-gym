<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Tatami - Atlas Gym</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2 style="margin-bottom: 10px;">Ingreso de Alumnos</h2>
            <p style="color: #888; font-size: 14px; margin-bottom: 25px; text-align: center;">Iniciá sesión para entrar a entrenar</p>
            
            <div id="g_id_onload"
                 data-client_id="949176060922-9itlaonlmrk6rks01m8dgdd1c850s3c1.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="filled_black"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left"
                 style="margin-bottom: 20px; display: flex; justify-content: center;">
            </div>

            <div style="display: flex; align-items: center; margin-bottom: 20px;">
                <hr style="flex: 1; border: 0; border-top: 1px solid #333;">
                <span style="margin: 0 10px; color: #555; font-size: 12px;">O CON EMAIL</span>
                <hr style="flex: 1; border: 0; border-top: 1px solid #333;">
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña">
            </div>
            
            <button type="submit" class="boton-ingresar">Iniciar Sesión</button>

            <div class="registro-link" style="text-align: center; margin-top: 20px;">
                <p style="color: #ccc;">¿Aún no pisaste el tatami?</p>
                <a href="registro.html" style="color: #d32f2f; text-decoration: none; font-weight: bold;">Registrar Nuevo Luchador</a>
            </div>
        </form>
    </div>

    <div id="toastNotificacion"></div>

    <script>
        function lanzarToast(msg, tipo) {
            const t = document.getElementById("toastNotificacion");
            t.innerText = msg;
            t.className = "mostrar " + (tipo || "");
            setTimeout(() => t.className = "", 3500);
        }

        function handleCredentialResponse(response) {
            fetch('http://localhost:7070/login-google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => {
                if (res.ok) return res.json();
                throw new Error("El servidor rechazó la autenticación de Google.");
            })
            .then(data => procesarLoginExitoso(data))
            .catch(error => lanzarToast("Error Google: " + error.message, ""));
        }

        document.getElementById('loginForm').addEventListener('submit', function(evento) {
            evento.preventDefault(); 
            const datosLogin = new FormData(this);

            fetch('http://localhost:7070/login', {
                method: 'POST',
                body: datosLogin
            })
            .then(respuesta => {
                if (respuesta.ok) return respuesta.json();
                return respuesta.text().then(texto => { throw new Error(texto) });
            })
            .then(data => procesarLoginExitoso(data))
            .catch(error => lanzarToast(error.message, ""));
        });

        function procesarLoginExitoso(data) {
            localStorage.setItem("nombreLuchador", data.nombre);
            localStorage.setItem("rolLuchador",    data.rol);
            localStorage.setItem("tokenAtlas",     data.token);
            /*
                NUEVO: Guardamos la membresía en localStorage.
                Esto nos permite saber en cualquier página si el usuario
                tiene pase libre, limitado o sin membresía,
                sin tener que consultar al servidor cada vez.
            */
            localStorage.setItem("membresiaAtlas", data.membresia || "sin_membresia");

            if (data.rol === "ADMIN") {
                window.location.href = "entrenador.html";
            } else {
                window.location.href = "calendario.html";
            }
        }
    </script>
</body>
</html>
