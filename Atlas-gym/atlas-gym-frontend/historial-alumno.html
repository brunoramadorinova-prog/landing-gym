<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Historial de Entrenamiento - Atlas Gym</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 600px; margin: 50px auto; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #444; text-align: left; }
        th { color: #ff4d4d; }
        .back-btn { display: inline-block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 0.9em; border: 1px solid #444; padding: 5px 15px; border-radius: 5px; }
        .badge-presente { 
            background-color: #2e7d32; color: white; padding: 3px 10px; 
            border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .badge-ausente { 
            background-color: #b71c1c; color: white; padding: 3px 10px; 
            border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .stats { 
            display: flex; justify-content: center; gap: 30px; 
            margin: 20px 0; padding: 15px; background: #2a2a2a; border-radius: 8px;
        }
        .stat-item { text-align: center; }
        .stat-numero { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🥋 Mi Historial de Batallas</h2>
        <p id="user-display" style="color: #888; font-style: italic;"></p>

        <!-- Estadísticas -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-numero" id="totalClases" style="color: #ffffff;">0</div>
                <div class="stat-label">TOTAL CLASES</div>
            </div>
            <div class="stat-item">
                <div class="stat-numero" id="totalPresentes" style="color: #2e7d32;">0</div>
                <div class="stat-label">PRESENTES</div>
            </div>
            <div class="stat-item">
                <div class="stat-numero" id="totalAusentes" style="color: #b71c1c;">0</div>
                <div class="stat-label">AUSENTES</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Día</th>
                    <th>Fecha</th>
                    <th>Clase</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-historial"></tbody>
        </table>
        <a href="mis-reservas.html" class="back-btn">← Volver a mis reservas</a>
    </div>

    <script>
        const nombreAlumno = localStorage.getItem("nombreLuchador");
        document.getElementById("user-display").innerText = "Guerrero: " + (nombreAlumno || "Desconocido");

        async function cargarHistorial() {
            if (!nombreAlumno) return;

            try {
                const res = await fetch(`https://landing-gym-81cn.onrender.com/historial-alumno?alumno=${encodeURIComponent(nombreAlumno)}`);
                const datos = await res.json();
                const tabla = document.getElementById("tabla-historial");

                if (datos.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>Aún no tenés asistencias registradas.</td></tr>";
                    return;
                }

                // Calcular estadísticas
                const presentes = datos.filter(h => h.estado === "PRESENTE").length;
                const ausentes  = datos.filter(h => h.estado === "AUSENTE").length;
                document.getElementById("totalClases").innerText   = datos.length;
                document.getElementById("totalPresentes").innerText = presentes;
                document.getElementById("totalAusentes").innerText  = ausentes;

                tabla.innerHTML = datos.map(h => `
                    <tr>
                        <td>${h.dia}</td>
                        <td>${h.fecha}</td>
                        <td>
                            ${h.disciplina}
                            <br><small style="color:#666">${h.horario}</small>
                        </td>
                        <td>
                            <span class="badge-${h.estado.toLowerCase()}">
                                ${h.estado}
                            </span>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error("Error cargando historial:", error);
            }
        }

        cargarHistorial();
    </script>
</body>
</html>
