<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - Atlas Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contenedor-calendario">
    <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div style="background: #1a1a1a; border: 1px solid #2e7d32; border-radius: 8px; padding: 40px; max-width: 450px; text-align: center;">
            <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
            <h2 style="color: #2e7d32; margin-bottom: 10px;">Pago Confirmado</h2>
            <p style="color: #ccc; margin-bottom: 10px;">
                Tu membresía fue activada exitosamente.
            </p>
            <p style="color: #888; font-size: 14px; margin-bottom: 30px;">
                Ya podés reservar tus clases en el calendario.
            </p>
            <a href="calendario.html" 
               style="display: inline-block; background: #2e7d32; color: white; padding: 12px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 15px;">
                IR AL CALENDARIO
            </a>
        </div>
    </div>

    <script>
        /*
            Cuando MercadoPago redirige acá, actualiza la membresía
            en el localStorage para que el calendario refleje el nuevo plan
            sin necesidad de cerrar sesión y volver a entrar.
            
            MP manda parámetros en la URL como:
            ?collection_status=approved&payment_type=credit_card
            Nosotros los ignoramos porque el webhook ya actualizó la DB.
            Solo actualizamos el localStorage del frontend.
        */
        const tipoMembresia = new URLSearchParams(window.location.search).get("tipo") || "libre";
        localStorage.setItem("membresiaAtlas", tipoMembresia);
    </script>
</body>
</html>
