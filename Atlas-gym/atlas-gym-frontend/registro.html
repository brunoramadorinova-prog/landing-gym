<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Atlas Gym</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="registro-container">

    <div class="formulario-container">
        <h2>Ingreso al Tatami</h2>
        
        <form id="registroForm">
            <div class="form-group">
                <label for="nombreAlumno">Nombre Completo</label>
                <input type="text" id="nombreAlumno" name="nombre" placeholder="Ej. Jon Jones" required>
            </div>

            <div class="form-group">
                <label for="emailAlumno">Email</label>
                <input type="email" id="emailAlumno" name="email" placeholder="tucorreo@email.com" required>
            </div>

            <div class="form-group">
                <label for="passwordAlumno">Contraseña</label>
                <input type="password" id="passwordAlumno" name="password" required>
            </div>

            <!--
                NUEVO: Selección de membresía durante el registro.
                El usuario elige su plan antes de completar el registro.
                Esto reemplaza el campo "Disciplina Base" que ya no aplica.
            -->
            <div class="form-group">
                <label>Plan de Membresía</label>

                <div onclick="seleccionarPlan('limitado')" id="card-limitado"
                    style="background: #2b2b2b; border: 2px solid #444; border-radius: 6px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: white; font-weight: bold; margin: 0;">Pase Limitado</p>
                            <p style="color: #888; font-size: 13px; margin: 4px 0 0 0;">2 clases por semana</p>
                        </div>
                        <span style="color: #d32f2f; font-size: 20px; font-weight: bold;">$1/mes</span>
                    </div>
                </div>

                <div onclick="seleccionarPlan('libre')" id="card-libre"
                    style="background: #2b2b2b; border: 2px solid #444; border-radius: 6px; padding: 15px; cursor: pointer; transition: 0.3s;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <p style="color: white; font-weight: bold; margin: 0;">Pase Libre</p>
                            <p style="color: #888; font-size: 13px; margin: 4px 0 0 0;">Clases ilimitadas</p>
                        </div>
                        <span style="color: #d32f2f; font-size: 20px; font-weight: bold;">$2/mes</span>
                    </div>
                </div>
            </div>

            <button type="submit">REGISTRAR Y PAGAR</button>
            
            <div class="enlaces-extra">
                <a href="login.html">Ya tenes cuenta? Inicia sesion</a>
            </div>
        </form>
    </div>

    <div id="toastNotificacion"></div>

    <script>
        /*
            planSeleccionado: guardamos el plan elegido acá.
            Empieza en null para forzar al usuario a elegir uno.
        */
        let planSeleccionado = null;

        function seleccionarPlan(tipo) {
            planSeleccionado = tipo;

            /*
                Resaltamos la card seleccionada con borde rojo
                y dejamos la otra con borde gris.
            */
            document.getElementById("card-limitado").style.border =
                tipo === "limitado" ? "2px solid #d32f2f" : "2px solid #444";
            document.getElementById("card-libre").style.border =
                tipo === "libre" ? "2px solid #d32f2f" : "2px solid #444";
        }

        function lanzarToast(msg, tipo) {
            const t = document.getElementById("toastNotificacion");
            t.innerText = msg;
            t.className = "mostrar " + (tipo || "");
            setTimeout(() => t.className = "", 3500);
        }

        document.getElementById('registroForm').addEventListener('submit', async function(evento) {
            evento.preventDefault();

            /*
                Validamos que haya elegido un plan antes de continuar.
                Si no eligió ninguno, mostramos un toast y cortamos.
            */
            if (!planSeleccionado) {
                lanzarToast("Selecciona un plan de membresía para continuar.", "");
                return;
            }

            const formData = new URLSearchParams(new FormData(this));

            try {
                /*
                    Paso 1: Registramos al usuario en la base de datos.
                    El backend guarda nombre, email y password.
                    La membresía se activa después del pago.
                */
                const respuesta = await fetch('http://localhost:7070/registrar-luchador', {
                    method: 'POST',
                    body: formData
                });

                const mensaje = await respuesta.text();

                if (!respuesta.ok) {
                    lanzarToast("Error: " + mensaje, "");
                    return;
                }

                /*
                    Paso 2: Guardamos el nombre en localStorage
                    para que el backend sepa a quién asignar la membresía
                    cuando MercadoPago confirme el pago via webhook.
                */
                localStorage.setItem("nombreLuchador", document.getElementById("nombreAlumno").value);
                localStorage.setItem("membresiaAtlas", "sin_membresia");

                /*
                    Paso 3: Creamos la preferencia de pago en MercadoPago
                    y redirigimos al usuario para que pague.
                */
                const resPago = await fetch("http://localhost:7070/crear-pago", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        tipo:   planSeleccionado,
                        nombre: document.getElementById("nombreAlumno").value
                    })
                });

                if (!resPago.ok) {
                    lanzarToast("Error al iniciar el pago. Intentá de nuevo.", "");
                    return;
                }

                const dataPago = await resPago.json();

                /*
                    Redirigimos a MercadoPago.
                    Cuando el pago sea aprobado, MP llama al webhook
                    que actualiza la membresía en la DB, y luego
                    redirige al usuario a pago-exitoso.html
                */
                window.location.href = dataPago.init_point;

            } catch (error) {
                lanzarToast("El servidor no responde. Intentá de nuevo.", "");
            }
        });
    </script>
</body>
</html>
